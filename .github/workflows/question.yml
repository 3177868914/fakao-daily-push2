name: 法考每日一题 - 题目推送

on:
  # 每天早上8点（UTC 0:00 = 北京 8:00）
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '推送模式'
        required: true
        default: 'question'
        type: choice
        options:
          - question
          - answer

jobs:
  push-questions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Push daily questions
        env:
          PUSH_MODE: ${{ github.event.inputs.mode || 'question' }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python main.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📝 Update state - questions pushed"
          git push
